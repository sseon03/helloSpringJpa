<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category List</title>
</head>
<body>
<h2>카테고리 목록</h2>

<!-- categoryList.html : 성공/오류 Flash 메시지 표시 -->
<p th:if="${successMessage}"
   th:text="${successMessage}" style="color: blue;"></p>
<p th:if="${errorMessage}"
   th:text="${errorMessage}" style="color: red;"></p>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <!-- th:each로 목록 반복, 삭제는 POST 폼으로 처리 -->
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <!--th:action에서 경로 변수 (id=${cat.id}) 바인딩 방법 -->
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<br>
<a th:href="@{/categories/create}">새 카테고리 등록하러 가기</a>

<hr>
<footer>
    <p>
        실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
        | 학번: 2371336 | 성명: 김선우
    </p>
</footer>
</body>
</html>
